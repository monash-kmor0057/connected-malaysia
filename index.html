<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Connected Malaysia</title>

    <!-- Vega Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HERO -->
    <header class="hero">

        <div class="hero-left">

            <h1>CONNECTED MALAYSIA</h1>

            <p>
                How internet access transformed Malaysian digital life
            </p>

        </div>

    </header>


    <!-- SECTION 1 -->
    <section class="dashboard-section">

        <div class="section-title">
            <h2>SECTION 1 | Growth of Connectivity</h2>
        </div>

        <div class="grid-3">

            <!-- CARD 1 -->
            <div class="chart-card">

                <div class="chart-number">1</div>

                <h3>Broadband subscriptions growth</h3>

                <div id="chart1"></div>

                <p class="annotation">
                    Mobile broadband subscriptions grew rapidly after 2010.
                </p>

            </div>


            <!-- CARD 2 -->
            <div class="chart-card">

                <div class="chart-number">2</div>

                <h3>Mobile-first internet shift</h3>

                <div id="chart2"></div>

            </div>


            <!-- CARD 3 -->
            <div class="chart-card">

                <div class="chart-number">3</div>

                <h3>Internet access over time</h3>

                <div id="chart3"></div>

            </div>

        </div>

    </section>


    <!-- JS -->
    <script src="js/main.js"></script>

</body>

</html>
