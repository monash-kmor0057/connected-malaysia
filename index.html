<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Connected Malaysia</title>

    <!-- Vega -->
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero">

        <h1>CONNECTED MALAYSIA</h1>

        <p>
            How internet access transformed Malaysian digital life
        </p>

    </header>


    <section class="dashboard-section">

        <div class="section-title">
            <h2>SECTION 1 | Growth of Connectivity</h2>
        </div>

        <div class="grid-3">

            <div class="chart-card">

                <div class="chart-number">1</div>

                <h3>Broadband subscriptions growth</h3>

                <div id="vis1"></div>

            </div>


            <div class="chart-card">

                <div class="chart-number">2</div>

                <h3>Mobile-first internet shift</h3>

                <div id="vis2"></div>

            </div>


            <div class="chart-card">

                <div class="chart-number">3</div>

                <h3>Internet access over time</h3>

                <div id="vis3"></div>

            </div>

        </div>

    </section>


    <script type="text/javascript">

        vegaEmbed('#vis1', 'vega/chart1_subscriptions.json');

        vegaEmbed('#vis2', 'vega/chart2_mobile_shift.json');

        vegaEmbed('#vis3', 'vega/chart3_penetration.json');

    </script>

</body>

</html>
